<!DOCTYPE html>
<html lang="zh-CN">
<head>
<title>清锋网络</title>
<link href="favicon.ico" rel="shortcut icon" type="image/x-icon">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
:root {
--bg-color: #2b2b2b;
--text-color: #ffffff;
--primary-color: #00c3ff;
--card-bg: rgba(255, 255, 255, 0.1);
--avatar-border-color: #aaa;
/* 灰白色边框颜色 */
--wechat-green: #21d247;
/* 微信绿 */
--qq-blue: #0099ff; /* 新增QQ蓝色 */
--dark-border-color: rgba(255, 255, 255, 0.3);
--light-border-color: rgba(0, 0, 0, 0.3);
}

/* 新增亮色主题变量 */
:root.light-mode {
--bg-color: #f5f5f5;
--text-color: #333333;
--primary-color: #007bff;
--card-bg: rgba(0, 0, 0, 0.05);
}

.light-mode .nav-btn {
border-color: var(--light-border-color);
box-shadow: 0 0 8px rgba(0, 0, 0, 0.05);
}

.nav-btn {
border: 1px solid var(--dark-border-color);
box-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
transition: all 0.3s;
}

.nav-btn:hover {
border-color: var(--primary-color);
box-shadow: 0 0 12px var(--primary-color);
}

/* 头像容器定位 */
.avatar-wrapper {
position: relative;
margin-bottom: 1.5rem;
width: min(100%, 32rem);
display: flex;
justify-content: center;
align-items: center;
}

* {
margin: 0;
padding: 0;
box-sizing: border-box;
touch-action: manipulation;
}

body {
background: var(--bg-color);
color: var(--text-color);
font-family: system-ui, -apple-system, sans-serif;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 2rem 1rem;
position: relative;
}

.avatar {
width: 8rem;
height: 8rem;
border-radius: 50%;
border: 3px solid var(--avatar-border-color);
/* 修改头像边框颜色 */
margin-bottom: 1.5rem;
object-fit: cover;
}

.contact-container {
display: flex;
flex-direction: column;
gap: 0.8rem;
align-items: center;
margin-bottom: 2rem;
}

.contact-item {
display: flex;
gap: 0.8rem;
align-items: center;
}

.copy-btn {
color: white;
padding: 0.4rem 1rem;
border-radius: 1rem;
cursor: pointer;
transition: opacity 0.3s;
border: none;
}

.wechat-copy-btn {
background: var(--wechat-green); /* 复制按钮底色换成微信绿 */
}

.qq-copy-btn {
background: var(--qq-blue); /* QQ复制按钮用QQ蓝 */
}


.copy-btn:hover {
opacity: 0.9;
}

.nav-container {
display: flex;
flex-direction: column;
gap: 1rem;
width: min(60%, 24rem);
/* 导航按钮宽度为五分之三 */
}

.nav-btn {
background: rgba(255, 255, 255, 0.1);
backdrop-filter: blur(4px);
color: var(--text-color);
/* 减小内边距 */
padding: 0.7rem;
border-radius: 2rem;
/* 导航按钮两边变圆 */
cursor: pointer;
width: 100%;
/* 减小字体大小 */
font-size: 0.9rem;
}

.nav-btn:active {
transform: scale(0.98);
}

.toast {
position: fixed;
bottom: 2rem;
left: 50%;
transform: translateX(-50%);
background: rgba(0, 0, 0, 0.8);
color: white;
padding: 0.8rem 1.5rem;
border-radius: 2rem;
opacity: 0;
transition: opacity 0.3s;
pointer-events: none;
}

.toast.show {
opacity: 1;
}

.record-link {
margin-top: 2rem;
font-size: 0.9rem;
}

.record-link a {
color: var(--text-color);
}

@media (max-width: 480px) {
body {
padding: 1.5rem 1rem;
}

.avatar {
width: 6rem;
height: 6rem;
}
}

/* 月亮图标 */
.moon-icon {
width: 18px;
height: 18px;
fill: var(--text-color);
}

/* 太阳图标 */
.light-mode .moon-icon {
display: none;
}

.sun-icon {
display: none;
width: 18px;
height: 18px;
fill: var(--text-color);
}

.light-mode .sun-icon {
display: block;
}

/* 微信客服按钮样式 */
.wechat-support-btn {
position: fixed;
right: 20px;
bottom: 35%;
width: 40px;
height: 40px;
border-radius: 50%;
background-color: var(--wechat-green);
color: white;
font-size: 18px;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: transform 0.3s;
}

.wechat-support-btn:hover {
transform: scale(1.1);
}

/* 日夜切换按钮样式 */
.theme-toggle {
position: fixed;
right: 20px;
bottom: calc(38% - 90px); /* 调整日夜切换按钮的位置，再往下移动一点 */
width: 40px;
height: 40px;
border-radius: 50%;
background: var(--card-bg);
backdrop-filter: blur(4px);
border: none;
cursor: pointer;
transition: transform 0.3s;
display: flex;
align-items: center;
justify-content: center;
}

.theme-toggle:hover {
transform: scale(1.1);
}

/* 微信客服二维码弹窗样式 */
.wechat-qrcode-modal {
display: none;
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-color: rgba(0, 0, 0, 0.7);
justify-content: center;
align-items: center;
 }

.wechat-qrcode-modal.show {
display: flex;
}

.wechat-qrcode {
width: 200px;
height: 200px;
background-color: white;
border-radius: 8px;
padding: 10px;
}
</style>
</head>

<body>
<div class="avatar-wrapper">
<img src="./head.jpg" class="avatar">
</div>

<!-- 修改为包含微信和QQ的联系容器 -->
<div class="contact-container">
<div class="contact-item">
<span id="wechatId">微信客服：FenerSS</span>
<button class="copy-btn wechat-copy-btn" onclick="copyWechat()">复制</button>
</div>
<div class="contact-item">
<span id="qqId">QQ客服：1065613791</span>
<button class="copy-btn qq-copy-btn" onclick="copyQQ()">复制</button>
</div>
</div>

<div class="nav-container">
<!--onclick参数【"window.open('./地址')"】是新窗口打开-->
<!--onclick参数【"window.open('./地址', '_self')"】是当前窗口打开-->
<button class="nav-btn" onclick="window.open('./cxfb', '_self')">程序发布页</button>
<button class="nav-btn" onclick="window.open('./yyzx', '_self')">应用中心</button>
<button class="nav-btn" onclick="window.open('./qfdh', '_self')">清锋导航</button>
</div>

<div class="toast" id="toast">复制成功!</div>

<div class="record-link">
<span>清锋网络 &copy; 2026</span>
</div>

<!-- 微信客服按钮 -->
<div class="wechat-support-btn" onclick="showWechatQRCode()">
<i class="fab fa-weixin"></i>
</div>

<!-- 日夜切换按钮 -->
<button class="theme-toggle" id="themeToggle">
<svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
<path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1-8.313-12.454z" />
</svg>
<svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
<path d="M12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12zm0-2a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM11 1h2v3h-2V1zm0 19h2v3h-2v-3zM3.515 4.929l1.414-1.414L7.05 5.636 5.636 7.05 3.515 4.93zM16.95 18.364l1.414-1.414 2.121 2.121-1.414 1.414-2.121-2.121zm2.121-14.85l1.414 1.415-2.121 2.121-1.414-1.414 2.121-2.121zM5.636 16.95l1.414 1.414-2.121 2.121-1.414-1.414 2.121-2.121zM23 11v2h-3v-2h3zM4 11v2H1v-2h3z" />
</svg>
</button>

<!-- 微信客服二维码弹窗 -->
<div class="wechat-qrcode-modal" id="wechatQrcodeModal">
<img class="wechat-qrcode" src="./wx2wm.jpg">
</div>

<script>
// 复制微信
const copyWechat = async () => {
const text = 'FenerSS';
try {
await navigator.clipboard.writeText(text);
showToast('微信复制成功!');
} catch (err) {
const input = document.createElement('input');
input.value = text;
document.body.appendChild(input);
input.select();
document.execCommand('copy');
document.body.removeChild(input);
showToast('微信复制成功!');
}
};

// 新增复制QQ
const copyQQ = async () => {
const text = '1065613791';
try {
await navigator.clipboard.writeText(text);
showToast('QQ复制成功!');
} catch (err) {
const input = document.createElement('input');
input.value = text;
document.body.appendChild(input);
input.select();
document.execCommand('copy');
document.body.removeChild(input);
showToast('QQ复制成功!');
}
};

// 优化提示框函数，支持自定义文字
const showToast = (message = '复制成功!') => {
const toast = document.getElementById('toast');
toast.textContent = message;
toast.classList.add('show');
setTimeout(() => toast.classList.remove('show'), 1500);
};

// 禁用双击缩放
document.addEventListener('dblclick', (e) => {
e.preventDefault();
}, { passive: false });

// 新增主题切换功能
const themeToggle = document.getElementById('themeToggle');
const html = document.documentElement;

// 初始化主题，默认显示白天模式
const savedTheme = localStorage.getItem('theme') || 'light';
html.classList.toggle('light-mode', savedTheme === 'light');

themeToggle.addEventListener('click', () => {
html.classList.toggle('light-mode');
const isLight = html.classList.contains('light-mode');
localStorage.setItem('theme', isLight? 'light' : 'dark');

// 兼容系统主题同步
if (isLight) {
document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#f5f5f5');
} else {
document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#2b2b2b');
}
});

// 自动匹配系统主题
const systemTheme = window.matchMedia('(prefers-color-scheme: light)');
systemTheme.addEventListener('change', e => {
if (!localStorage.getItem('theme')) {
html.classList.toggle('light-mode', e.matches);
}
});

// 显示微信客服二维码弹窗
const showWechatQRCode = () => {
const modal = document.getElementById('wechatQrcodeModal');
modal.classList.add('show');
document.addEventListener('click', closeWechatQRCodeOnClickOutside);
};

// 点击弹窗外部关闭二维码弹窗
const closeWechatQRCodeOnClickOutside = (e) => {
const modal = document.getElementById('wechatQrcodeModal');
if (e.target === modal) {
modal.classList.remove('show');
document.removeEventListener('click', closeWechatQRCodeOnClickOutside);
}
};
</script>

</body>
</html>
